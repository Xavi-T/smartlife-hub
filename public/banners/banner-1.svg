<svg width="1600" height="520" viewBox="0 0 1600 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title1 desc1">
  <title id="title1">Banner khuyến mãi gia dụng</title>
  <desc id="desc1">Ưu đãi gia dụng thông minh</desc>
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="520" fill="url(#bg1)"/>
  <circle cx="1260" cy="120" r="170" fill="rgba(255,255,255,0.16)"/>
  <circle cx="1420" cy="360" r="220" fill="rgba(255,255,255,0.1)"/>
  <g fill="#ffffff">
    <text x="100" y="190" font-family="Arial, Helvetica, sans-serif" font-size="62" font-weight="700">Ưu Đãi Gia Dụng Thông Minh</text>
    <text x="100" y="260" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="500" opacity="0.95">Giảm giá đến 30% cho sản phẩm nổi bật tuần này</text>
    <rect x="100" y="305" rx="14" ry="14" width="320" height="70" fill="rgba(255,255,255,0.18)"/>
    <text x="140" y="351" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Mua ngay hôm nay</text>
  </g>
</svg>
